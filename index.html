<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧪 Smart Tools Pro</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:tahoma;
background:linear-gradient(135deg,#2563eb,#020617);
min-height:100vh;
}


/* صفحه شروع */

#loading{
position:fixed;
width:100%;
height:100%;
background:#020617;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:9999;
}


.logo{
font-size:35px;
font-weight:bold;
animation:zoom 1.5s infinite;
}


@keyframes zoom{

50%{
transform:scale(1.15);
}

}



.bar{

width:80%;
height:20px;
background:#334155;
border-radius:20px;
margin-top:30px;
overflow:hidden;

}



.progress{

height:100%;
width:0%;
background:#2563eb;

}



#percent{

margin-top:10px;
font-size:20px;

}




.container{

max-width:420px;
margin:auto;
padding:20px;

}



.box{

background:white;
padding:20px;
border-radius:25px;
box-shadow:0 0 30px #0006;

}



h1{

text-align:center;
color:#2563eb;

}



.card{

background:#f1f5f9;
padding:15px;
border-radius:18px;
margin:15px 0;

}



button{

width:100%;
padding:12px;
border:0;
border-radius:15px;
background:#2563eb;
color:white;
font-size:16px;
margin-top:8px;

}



input{

width:100%;
padding:10px;
border-radius:10px;
border:1px solid #aaa;

}



footer{

text-align:center;
margin-top:20px;
font-weight:bold;
color:#2563eb;

}

</style>

</head>


<body>


<div id="loading">

<div class="logo">
🧪 Smart Tools Pro
</div>


<div class="bar">
<div class="progress" id="progress"></div>
</div>


<div id="percent">
0%
</div>


</div>



<div class="container">

<div class="box">


<h1>
🧪 Smart Tools Pro
</h1><h1>
🧪 Smart Tools Pro
</h1><div class="card">

<h3>📱 اطلاعات دستگاه</h3>

<p id="device">در حال دریافت...</p>

</div>



<div class="card">

<h3>🧮 ماشین حساب</h3>

<input id="a" placeholder="عدد اول">

<input id="b" placeholder="عدد دوم">

<button onclick="calc()">محاسبه</button>

<p id="result"></p>

</div>



<div class="card">

<h3>⏱ تایمر</h3>

<input id="time" placeholder="ثانیه">

<button onclick="startTimer()">شروع تایمر</button>

<p id="timer">آماده</p>

</div>



<div class="card">

<h3>🎲 تاس</h3>

<button onclick="dice()">انداختن تاس</button>

<p id="dice"></p>

</div>



<div class="card">

<h3>🎯 بازی حدس عدد</h3>

<p>یک عدد بین ۱ تا ۱۰ حدس بزن</p>

<input id="guess">

<button onclick="guessGame()">حدس</button>

<p id="game"></p>

</div>



<div class="card">

<h3>🚀 تست سرعت اینترنت</h3>

<button onclick="speedTest()">شروع تست</button>

<p id="speed">آماده</p>

</div>



<div class="card">

<button onclick="darkMode()">🌙 حالت شب</button>

</div>



<footer>
سازنده: علی منصوری
</footer>


</div>

</div>
