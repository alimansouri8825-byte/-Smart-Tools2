<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧪 Smart Tools Pro</title>

<style>

body{
margin:0;
font-family:tahoma;
background:linear-gradient(135deg,#2563eb,#020617);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
transition:1s;
}

.box{
width:380px;
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 0 30px #0008;
}

h1{
text-align:center;
color:#2563eb;
}

.card{
background:#f1f5f9;
padding:15px;
border-radius:18px;
margin:15px 0;
}

button{
width:100%;
padding:12px;
border:0;
border-radius:15px;
background:#2563eb;
color:white;
font-size:16px;
margin-top:8px;
cursor:pointer;
}

input,select{
width:90%;
padding:10px;
margin:5px;
border-radius:10px;
border:1px solid #aaa;
}

#gameBox{
text-align:center;
font-size:22px;
}

footer{
text-align:center;
padding:15px;
font-weight:bold;
color:#2563eb;
}


.dark{
background:#000;
}

.dark .box{
background:#1e293b;
color:white;
}

.dark .card{
background:#334155;
}

</style>

</head>

<body>


<div class="box">


<h1>🧪 Smart Tools Pro</h1>


<div class="card">
<h3>📱 اطلاعات دستگاه</h3>
<p id="device">در حال دریافت...</p>
</div>


<div class="card">
<h3>🚀 تست سرعت اینترنت</h3>
<button onclick="speedTest()">شروع تست</button>
<p id="speed">آماده</p>
</div>


<div class="card">
<h3>📡 تست پینگ</h3>
<button onclick="pingTest()">تست پینگ</button>
<p id="ping">آماده</p>
</div>


<div class="card">
<h3>🔋 باتری</h3>
<button onclick="battery()">بررسی باتری</button>
<p id="bat">آماده</p>
</div>


<div class="card">
<h3>🧮 تبدیل واحد</h3>

<input id="unit" placeholder="عدد">

<select id="type">
<option value="km">کیلومتر به متر</option>
<option value="m">متر به کیلومتر</option>
</select>

<button onclick="convert()">تبدیل</button>

<p id="convert"></p>

</div>


<div class="card">
<h3>🎮 بازی سنگ کاغذ قیچی</h3>

<button onclick="rps('سنگ')">🪨 سنگ</button>
<button onclick="rps('کاغذ')">📄 کاغذ</button>
<button onclick="rps('قیچی')">✂️ قیچی</button>

<p id="gameBox"></p>

</div>


<div class="card">
<button onclick="dark()">🌙 حالت شب</button>
</div>


<footer>
سازنده: علی منصوری
</footer>


</div><script>

document.getElementById("device").innerHTML =
"🌐 زبان: " + navigator.language +
"<br><br>📐 صفحه: " +
screen.width+" × "+screen.height+
"<br><br>⚙️ هسته CPU: "+
(navigator.hardwareConcurrency || "نامشخص")+
"<br><br>📶 وضعیت اینترنت: "+
(navigator.onLine ? "آنلاین" : "آفلاین");



// تست سرعت اینترنت

async function speedTest(){

let out=document.getElementById("speed");

out.innerHTML="⏳ در حال تست...";

try{

let start=performance.now();

let r=await fetch(
"https://speed.cloudflare.com/__down?bytes=10000000&x="+Date.now()
);

let data=await r.blob();

let end=performance.now();

let sec=(end-start)/1000;

let mbps=((data.size*8)/sec/1000000).toFixed(2);


out.innerHTML=
"🚀 سرعت دانلود: "+mbps+" Mbps";

}

catch{

out.innerHTML="❌ تست نشد";

}

}



// تست پینگ

async function pingTest(){

let out=document.getElementById("ping");

out.innerHTML="⏳ تست...";


let start=Date.now();


try{

await fetch(
"https://www.google.com/favicon.ico?"+Date.now()
);


let time=Date.now()-start;


out.innerHTML=
"📡 پینگ: "+time+" ms";


}

catch{

out.innerHTML="❌ خطا";

}

}




// باتری

async function battery(){

let out=document.getElementById("bat");


if(navigator.getBattery){

let b=await navigator.getBattery();

out.innerHTML=
"🔋 شارژ: "+
Math.round(b.level*100)+"%"+
"<br>"+
(b.charging ? "⚡ در حال شارژ" : "🔌 بدون شارژ");

}

else{

out.innerHTML=
"این مرورگر پشتیبانی نمی‌کند";

}

}




// تبدیل واحد

function convert(){

let n=Number(document.getElementById("unit").value);

let t=document.getElementById("type").value;

let r="";


if(t=="km"){

r=n*1000+" متر";

}

else{

r=n/1000+" کیلومتر";

}


document.getElementById("convert").innerHTML=r;

}




// سنگ کاغذ قیچی

function rps(user){

let list=["سنگ","کاغذ","قیچی"];

let bot=list[Math.floor(Math.random()*3)];


let result="";


if(user==bot){

result="مساوی 😐";

}

else if(
(user=="سنگ"&&bot=="قیچی")||
(user=="کاغذ"&&bot=="سنگ")||
(user=="قیچی"&&bot=="کاغذ")
){

result="بردی 🎉";

}

else{

result="باختی 😅";

}


document.getElementById("gameBox").innerHTML=
"تو: "+user+
"<br>کامپیوتر: "+bot+
"<br>"+result;

}




function dark(){

document.body.classList.toggle("dark");

}


</script>

</body>
</html>
