<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧪Smart Tools Ultra🧪</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:tahoma;
background:
linear-gradient(135deg,#020617,#2563eb);

color:white;
text-align:center;

}



/* صفحه لود */

#loader{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:
linear-gradient(135deg,#020617,#1d4ed8);

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;

z-index:9999;

}


.logo{

font-size:40px;
animation:pulse 1s infinite;

}


@keyframes pulse{

50%{
transform:scale(1.15);
}

}



.loadBox{

width:80%;
height:25px;

background:#ffffff33;

border-radius:30px;

overflow:hidden;

margin-top:25px;

}


#loadBar{

width:0%;

height:100%;

background:#22c55e;

border-radius:30px;

transition:.1s;

}


#loadingText{

margin-top:15px;

font-size:20px;

}





.card{

background:#ffffff22;

margin:15px;

padding:20px;

border-radius:25px;

backdrop-filter:blur(10px);

}



button{

background:#22c55e;

color:white;

border:0;

padding:12px 25px;

border-radius:15px;

font-size:16px;

cursor:pointer;

}



.result{

font-size:17px;

line-height:2;

}



canvas{

background:#111;

border-radius:15px;

}



</style>

</head>



<body>



<div id="loader">

<div class="logo">
🧪
</div>


<h1>
Smart Tools Ultra
</h1>


<div id="loadingText">
در حال آماده سازی... 0%
</div>


<div class="loadBox">

<div id="loadBar"></div>

</div>


</div>




<h1>
🧪 Smart Tools Ultra
</h1>



<div class="card">

<h2>
📱 اطلاعات دستگاه
</h2>

<div id="device" class="result">

در حال دریافت...

</div>

</div>
<div class="card">

<h2>⚡ تست سرعت گوشی</h2>

<button onclick="phoneTest()">
شروع تست
</button>

<div id="phone" class="result"></div>

</div>



<div class="card">

<h2>📡 تست پینگ</h2>

<button onclick="pingTest()">
تست پینگ
</button>

<div id="ping" class="result"></div>

</div>




<div class="card">

<h2>🌐 تست اینترنت</h2>

<button onclick="internetTest()">
تست سرعت
</button>

<div id="internet" class="result"></div>

</div>




<div class="card">

<h2>🔐 تولید رمز قوی</h2>

<button onclick="makePassword()">
ساخت رمز
</button>

<div id="pass" class="result"></div>

</div>




<script>


// اطلاعات دستگاه

document.getElementById("device").innerHTML=
`
📱 مرورگر:
${navigator.userAgent}

<br>

📐 صفحه:
${screen.width} × ${screen.height}

<br>

🧠 هسته پردازنده:
${navigator.hardwareConcurrency || "نامشخص"}

<br>

💾 حافظه:
${navigator.deviceMemory || "نامشخص"} GB

`;




// تست سرعت گوشی

function phoneTest(){

let start=performance.now();

let x=0;

for(let i=0;i<10000000;i++){

x+=i;

}

let end=performance.now();


document.getElementById("phone").innerHTML=
"⚡ امتیاز سرعت: "+
Math.round(100000/(end-start));

}




// تست پینگ

function pingTest(){

let start=Date.now();


fetch(
"https://cloudflare.com/cdn-cgi/trace?"+Math.random(),
{
mode:"no-cors"
}
)

.then(()=>{

document.getElementById("ping").innerHTML=
"📡 پینگ تقریبی: "+
(Date.now()-start)+
" ms";

})

.catch(()=>{

document.getElementById("ping").innerHTML=
"❌ خطا در اتصال";

});

}





// تست اینترنت تقریبی

function internetTest(){

let start=Date.now();


fetch(
"https://speed.cloudflare.com/__down?bytes=500000"
)

.then(()=>{

let time=Date.now()-start;

let speed=(0.5/(time/1000)).toFixed(2);


document.getElementById("internet").innerHTML=
"🌐 سرعت تقریبی: "+
speed+
" MB/s";

})

.catch(()=>{

document.getElementById("internet").innerHTML=
"❌ تست انجام نشد";

});

}





// ساخت رمز

function makePassword(){

let chars=
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%";


let pass="";


for(let i=0;i<16;i++){

pass+=chars[
Math.floor(Math.random()*chars.length)
];

}


document.getElementById("pass").innerHTML=
"🔑 "+pass;

}



</script>
<div class="card">

<h2>🎮 بازی‌ها</h2>


<h3>✊ سنگ، کاغذ، قیچی</h3>

<button onclick="rps('سنگ')">🪨 سنگ</button>
<button onclick="rps('کاغذ')">📄 کاغذ</button>
<button onclick="rps('قیچی')">✂️ قیچی</button>


<div id="game1" class="result"></div>


<hr>


<h3>⚡ تست سرعت واکنش</h3>

<button onclick="startReaction()">
شروع
</button>

<div id="reaction" class="result"></div>


</div>




<div class="card">

<h2>🐍 بازی مار</h2>

<canvas id="snake" width="300" height="300"></canvas>

<br>

<button onclick="startSnake()">
شروع مار
</button>

<div id="score" class="result">
امتیاز: 0
</div>


</div>





<script>


// سنگ کاغذ قیچی

function rps(user){

let list=[
"سنگ",
"کاغذ",
"قیچی"
];


let cpu=
list[Math.floor(Math.random()*3)];


let result;


if(user==cpu){

result="مساوی 😐";

}

else if(
(user=="سنگ" && cpu=="قیچی")||
(user=="کاغذ" && cpu=="سنگ")||
(user=="قیچی" && cpu=="کاغذ")
){

result="بردی 🎉";

}

else{

result="باختی 😅";

}


document.getElementById("game1").innerHTML=
"تو: "+user+
"<br>کامپیوتر: "+cpu+
"<br>"+result;

}





// تست واکنش

let reactionStart;


function startReaction(){

let box=
document.getElementById("reaction");


box.innerHTML=
"⏳ صبر کن...";


setTimeout(()=>{


reactionStart=Date.now();


box.innerHTML=
"⚡ کلیک کن!";


box.onclick=function(){

box.innerHTML=
"⏱ زمان: "+
(Date.now()-reactionStart)+
" میلی‌ثانیه";

};


},Math.random()*4000+1000);


}





// بازی مار

let canvas=
document.getElementById("snake");

let ctx=
canvas.getContext("2d");


let snake=[];
let food={};

let dx=10;
let dy=0;

let game;
let score=0;



function startSnake(){


snake=[
{x:150,y:150},
{x:140,y:150},
{x:130,y:150}
];


food={
x:Math.floor(Math.random()*30)*10,
y:Math.floor(Math.random()*30)*10
};


dx=10;
dy=0;

score=0;


document.getElementById("score").innerHTML=
"امتیاز: 0";


clearInterval(game);

game=setInterval(drawSnake,100);


}





// کنترل لمسی

let startX=0;
let startY=0;


document.addEventListener("touchstart",e=>{

startX=e.touches[0].clientX;
startY=e.touches[0].clientY;

});



document.addEventListener("touchend",e=>{


let x=e.changedTouches[0].clientX-startX;
let y=e.changedTouches[0].clientY-startY;



if(Math.abs(x)>Math.abs(y)){


if(x>0 && dx!=-10){
dx=10;dy=0;
}

if(x<0 && dx!=10){
dx=-10;dy=0;
}


}

else{


if(y>0 && dy!=-10){
dx=0;dy=10;
}

if(y<0 && dy!=10){
dx=0;dy=-10;
}


}


});





function drawSnake(){


ctx.clearRect(0,0,300,300);



ctx.fillStyle="red";

ctx.fillRect(food.x,food.y,10,10);



snake.forEach(part=>{

ctx.fillStyle="lime";

ctx.fillRect(part.x,part.y,10,10);

});



let head={
x:snake[0].x+dx,
y:snake[0].y+dy
};



if(head.x==food.x && head.y==food.y){

score++;


document.getElementById("score").innerHTML=
"امتیاز: "+score;


food={
x:Math.floor(Math.random()*30)*10,
y:Math.floor(Math.random()*30)*10
};


}

else{

snake.pop();

}



if(
head.x<0 ||
head.x>=300 ||
head.y<0 ||
head.y>=300
){

clearInterval(game);

alert("باختی 😅 امتیاز: "+score);

return;

}


snake.unshift(head);


}
<script>


// لودینگ سایت 🧪

let progress = 0;

let loading = setInterval(()=>{


progress++;


document.getElementById("loadBar").style.width =
progress + "%";


document.getElementById("loadingText").innerHTML =
"در حال آماده سازی... " + progress + "%";



if(progress >= 100){


clearInterval(loading);



document.getElementById("loader").style.opacity="0";


setTimeout(()=>{

document.getElementById("loader").style.display="none";

},500);


}



},25);



</script>



<footer>

<h3>
ساخته شده توسط علی منصوری ☠️
</h3>

</footer>



</body>

</html>
