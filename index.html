<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Tools</title>

<style>

body{
margin:0;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:tahoma,sans-serif;
color:white;
text-align:center;
}

.box{
background:#0f172a;
padding:30px;
border-radius:20px;
max-width:500px;
width:90%;
}

h1{
font-size:32px;
margin-bottom:20px;
}

p{
font-size:20px;
line-height:1.8;
}

.loading{
font-size:26px;
margin-top:20px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{
opacity:0.3;
}
}

</style>

</head>

<body>

<div class="box">

<h1>🧪 Smart Tools 🧪</h1>

<p>
در حال بروزرسانی نسخه <b>Pro Max</b><br>
به نسخه <b>Ultra</b>
</p>

<div class="loading">
...Loading
</div>

</div>

</body>
</html>
