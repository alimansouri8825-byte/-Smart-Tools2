<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Tools Pro</title>

<style>

body{
margin:0;
font-family:tahoma;
background:#020617;
}


#loading{
position:fixed;
width:100%;
height:100%;
background:#020617;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
}


.loading-text{
font-size:26px;
font-weight:bold;
margin-bottom:20px;
}


.bar{
width:80%;
height:20px;
background:#334155;
border-radius:20px;
overflow:hidden;
}


.progress{
height:100%;
width:0%;
background:#2563eb;
}


#percent{
margin-top:10px;
font-size:20px;
}



#site{
display:none;
background:white;
min-height:100vh;
padding:20px;
}


.box{
max-width:450px;
margin:auto;
}


h1{
text-align:center;
color:#2563eb;
}


.card{
background:#f1f5f9;
padding:15px;
margin:15px 0;
border-radius:18px;
}


footer{
text-align:center;
font-weight:bold;
margin-top:20px;
}

</style>

</head>


<body>


<div id="loading">

<div class="loading-text">
Loading...
</div>


<div class="bar">
<div class="progress" id="progress"></div>
</div>


<div id="percent">
0%
</div>

</div>



<div id="site">

<div class="box">


<h1>
🧪 Smart Tools Pro
</h1><h1>
🧪 Smart Tools Pro
</h1><div class="card">

<h3>📱 اطلاعات دستگاه</h3>

<p id="device">
در حال دریافت...
</p>

</div>


<div class="card">

<h3>🧮 ماشین حساب</h3>

<input id="a" placeholder="عدد اول">

<input id="b" placeholder="عدد دوم">

<button onclick="calc()">
محاسبه
</button>

<p id="result"></p>

</div>


<div class="card">

<h3>⏱ تایمر</h3>

<input id="time" placeholder="ثانیه">

<button onclick="startTimer()">
شروع
</button>

<p id="timer">آماده</p>

</div>


<div class="card">

<h3>🎲 تاس</h3>

<button onclick="dice()">
انداختن تاس
</button>

<p id="dice"></p>

</div>


<div class="card">

<h3>🚀 تست سرعت اینترنت</h3>

<button onclick="speedTest()">
شروع تست
</button>

<p id="speed">
آماده
</p>

</div>


<div class="card">

<h3>📡 تست پینگ</h3>

<button onclick="pingTest()">
شروع تست
</button>

<p id="ping">
آماده
</p>

</div>


<footer>
سازنده: علی منصوری
</footer>


</div>

</div><script>


// لودینگ

let p = 0;

let load = setInterval(function(){

p++;

document.getElementById("progress").style.width = p + "%";

document.getElementById("percent").innerHTML = p + "%";


if(p >= 100){

clearInterval(load);

document.getElementById("loading").style.display = "none";

document.getElementById("site").style.display = "block";

}

},30);




// اطلاعات دستگاه

document.getElementById("device").innerHTML =

"🌐 زبان: " + navigator.language +
"<br><br>📐 صفحه: " + screen.width + " × " + screen.height +
"<br><br>⚙️ هسته CPU: " +
(navigator.hardwareConcurrency || "نامشخص");




// ماشین حساب

function calc(){

let a = Number(document.getElementById("a").value);

let b = Number(document.getElementById("b").value);


document.getElementById("result").innerHTML =
"نتیجه: " + (a+b);

}




// تایمر

let timer;

function startTimer(){

clearInterval(timer);

let t = Number(document.getElementById("time").value);


timer = setInterval(()=>{


document.getElementById("timer").innerHTML =
t + " ثانیه";


t--;


if(t < 0){

clearInterval(timer);

document.getElementById("timer").innerHTML =
"⏰ تمام شد";

}


},1000);

}




// تاس

function dice(){

let x = Math.floor(Math.random()*6)+1;


document.getElementById("dice").innerHTML =
"🎲 عدد: " + x;

}




// پینگ اصلاح شده

async function pingTest(){

let out = document.getElementById("ping");

out.innerHTML = "⏳ در حال تست...";


try{

let start = Date.now();


await fetch(
"https://www.google.com/favicon.ico?time="+Date.now(),
{mode:"no-cors"}
);


let end = Date.now();


out.innerHTML =
"📡 پینگ تقریبی: " + (end-start) + " ms";


}catch(e){

out.innerHTML =
"⚠️ مرورگر اجازه تست دقیق پینگ نمی‌دهد";

}

}




// تست سرعت تقریبی

async function speedTest(){

let out = document.getElementById("speed");

out.innerHTML="⏳ در حال تست...";


try{

let start = performance.now();


let response = await fetch(
"https://speed.cloudflare.com/__down?bytes=1000000&x="+Date.now()
);


await response.blob();


let end = performance.now();


let seconds = (end-start)/1000;


let speed = (1/seconds).toFixed(2);


out.innerHTML =
"🚀 سرعت تقریبی: " + speed + " MB/s";


}catch(e){

out.innerHTML =
"⚠️ تست سرعت محدود شد";

}

}


</script>
